<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filip Łodyga | Kontroler Finansowy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">FILIP ŁODYGA</a>
        <div class="menu">
            <a href="#about">O mnie</a>
            <a href="blog.html">Blog</a>
            <a href="#contact">Kontakt</a>
        </div>
    </nav>
    <header class="hero" style="background: var(--ink); color: #fff; padding: 120px 48px; text-align: center;">
        <h1 class="fade-in">Filip Łodyga</h1>
        <p class="fade-in" style="margin-top: 20px; font-size: 20px;">Kontroler Finansowy · Automatyzacja · Dane</p>
    </header>
    <section id="about" class="fade-in">
        <h2>O mnie</h2>
        <div class="card">
            <p>Specjalizuję się w optymalizacji procesów finansowych w MŚP...</p>
        </div>
    </section>
    
    <script>
        const obs = new IntersectionObserver(entries => {{
            entries.forEach(e => {{ if(e.isIntersecting) e.target.classList.add('visible'); }});
        }});
        document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
    </script>
</body>
</html>
